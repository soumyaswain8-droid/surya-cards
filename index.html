<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#020012">
<title>Surya AI Tech - Cards</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#020012;color:#fff;font-family:'Rajdhani',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 20px}
  .sun{width:60px;height:60px;border-radius:50%;background:radial-gradient(circle,#fff,#FFD700 25%,#FFB800 50%,rgba(255,184,0,0));box-shadow:0 0 30px rgba(255,184,0,0.5),0 0 70px rgba(255,184,0,0.2);margin-bottom:16px}
  h1{font-family:'Orbitron',sans-serif;font-size:22px;font-weight:800;letter-spacing:6px;color:#FFB800;margin-bottom:6px}
  .sub{font-size:12px;color:#444;letter-spacing:3px;margin-bottom:40px}
  .cards{display:flex;flex-direction:column;gap:16px;width:100%;max-width:320px}
  a{text-decoration:none;display:block;padding:18px 24px;border:1px solid rgba(255,184,0,0.2);border-radius:12px;background:rgba(255,184,0,0.03);transition:all 0.3s;text-align:center}
  a:active,a:hover{background:rgba(255,184,0,0.1);border-color:rgba(255,184,0,0.4)}
  .card-name{font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:3px;color:#fff}
  .card-role{font-size:10px;color:#888;letter-spacing:2px;margin-top:4px}
  .galaxy-link{border-color:rgba(0,200,255,0.2);background:rgba(0,200,255,0.03);margin-top:10px}
  .galaxy-link:active,.galaxy-link:hover{background:rgba(0,200,255,0.1);border-color:rgba(0,200,255,0.4)}
  .galaxy-label{color:#00c8ff}
</style>
</head>
<body>
  <div class="sun"></div>
  <h1>SURYA AI TECH</h1>
  <p class="sub">Digital Business Cards</p>
  <div class="cards">
    <a href="kishore-card.html">
      <div class="card-name">KISHORE RAJENDRA</div>
      <div class="card-role">Co-Founder &amp; CTO</div>
    </a>
    <a href="soumya-card.html">
      <div class="card-name">SOUMYA SWAIN</div>
      <div class="card-role">Co-Founder &amp; Founding Member</div>
    </a>
    <a href="ar-viewer.html" class="galaxy-link">
      <div class="card-name galaxy-label">3D GALAXY EXPERIENCE</div>
      <div class="card-role">Explore our universe in AR</div>
    </a>
  </div>
</body>
</html>
