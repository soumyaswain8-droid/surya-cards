<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<title>Surya AI Tech - AR Galaxy</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&family=Exo+2:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@300;400;500&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Rajdhani',sans-serif;touch-action:none}
  canvas{position:fixed;inset:0;z-index:2}
  #cameraFeed{position:fixed;inset:0;object-fit:cover;width:100%;height:100%;z-index:1;opacity:0;transition:opacity 0.5s}
  #cameraFeed.active{opacity:1}

  .nav-hint{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:100;text-align:center;pointer-events:none;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;color:rgba(255,255,255,0.25);text-transform:uppercase;animation:hintFade 6s ease 4s forwards}
  @keyframes hintFade{to{opacity:0}}

  .top-controls{position:fixed;top:env(safe-area-inset-top,10px);left:50%;transform:translateX(-50%);z-index:100;display:flex;gap:0;background:rgba(0,0,0,0.5);border-radius:20px;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.08);margin-top:10px}
  .p-btn{font-family:'Orbitron',sans-serif;font-size:8px;letter-spacing:2px;padding:8px 18px;border:none;background:transparent;color:rgba(255,255,255,0.35);cursor:pointer;border-radius:20px;text-transform:uppercase}
  .p-btn.active{background:rgba(255,184,0,0.2);color:#FFB800}

  .bottom-controls{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);z-index:100;display:flex;gap:12px}
  .ctrl-btn{font-family:'Orbitron',sans-serif;font-size:8px;letter-spacing:2px;padding:10px 22px;border:1px solid rgba(255,184,0,0.25);background:rgba(0,0,0,0.5);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);color:rgba(255,255,255,0.5);border-radius:25px;cursor:pointer;text-transform:uppercase}
  .ctrl-btn:active{background:rgba(255,184,0,0.15);color:#FFB800}
  .ctrl-btn.active-btn{background:rgba(255,184,0,0.12);color:#FFB800;border-color:rgba(255,184,0,0.4)}

  .start-screen{position:fixed;inset:0;z-index:200;background:#020012;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
  .start-screen .logo-sun{width:70px;height:70px;border-radius:50%;background:radial-gradient(circle,#fff,#FFD700 25%,#FFB800 50%,rgba(255,184,0,0) 100%);box-shadow:0 0 30px rgba(255,184,0,0.5),0 0 70px rgba(255,184,0,0.2),0 0 120px rgba(255,184,0,0.08);margin-bottom:8px;animation:sp 3s ease-in-out infinite}
  @keyframes sp{0%,100%{box-shadow:0 0 30px rgba(255,184,0,0.5),0 0 70px rgba(255,184,0,0.2)}50%{box-shadow:0 0 40px rgba(255,184,0,0.6),0 0 90px rgba(255,184,0,0.3)}}
  .start-screen h2{font-family:'Orbitron',sans-serif;font-size:20px;font-weight:800;letter-spacing:6px;color:#FFB800}
  .start-screen .sub{font-family:'Rajdhani',sans-serif;font-size:13px;color:#444;letter-spacing:3px}
  .start-btn{font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:3px;padding:14px 36px;border:2px solid #FFB800;background:transparent;color:#FFB800;border-radius:30px;cursor:pointer;margin-top:16px;text-transform:uppercase}
  .start-btn:active{background:rgba(255,184,0,0.1)}
  .ar-btn-start{margin-top:4px;border-color:rgba(0,200,255,0.4);color:rgba(0,200,255,0.7);font-size:9px;padding:10px 28px}
  .hidden{display:none!important}
</style>
</head>
<body>

<div class="start-screen" id="startScreen">
  <div class="logo-sun"></div>
  <h2>SURYA AI TECH</h2>
  <p class="sub">3D Galaxy Business Card</p>
  <button class="start-btn" onclick="launch(false)">Enter Galaxy</button>
  <button class="start-btn ar-btn-start" onclick="launch(true)">AR Mode (Camera)</button>
</div>

<video id="cameraFeed" autoplay playsinline muted></video>

<div class="nav-hint hidden" id="navHint">Drag to orbit &bull; Pinch to zoom &bull; Explore the galaxy</div>

<div class="top-controls hidden" id="topControls">
  <button class="p-btn active" id="btnK" onclick="switchPerson('k')">Kishore</button>
  <button class="p-btn" id="btnS" onclick="switchPerson('s')">Soumya</button>
</div>

<div class="bottom-controls hidden" id="bottomControls">
  <button class="ctrl-btn" id="arToggle" onclick="toggleAR()">AR Mode</button>
  <button class="ctrl-btn" onclick="resetView()">Reset View</button>
  <button class="ctrl-btn" onclick="shareGalaxy()">Share</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<!-- No bloom - clean rendering for readable text -->
<script>
var scene, camera, renderer;
var sun, galaxyParticles, nebulaSprites = [], planets = [], textSprites = [];
var shootingStars = [];
var arMode = false;

var spherical = { theta: 0.3, phi: Math.PI / 3.2, radius: 5.5 };
var targetSpherical = { theta: 0.3, phi: Math.PI / 3.2, radius: 5.5 };
var isDragging = false, lastTouch = { x: 0, y: 0 }, lastPinchDist = 0, autoRotate = true;

var people = {
  k: { name: 'KISHORE RAJENDRA', title: 'CO-FOUNDER & CTO', email: 'kishore@devpilot.co.in', linkedin: 'kishorer747', telegram: '@chi_shift' },
  s: { name: 'SOUMYA SWAIN', title: 'CO-FOUNDER & FOUNDING MEMBER', email: 'sowmya@devpilot.co.in', linkedin: 'soumya-swain', telegram: '@soumyaswian' }
};
var currentPerson = 'k';

var textLayout = {
  name:     { pos: [5.0, 2.0, -2.5],   scale: 2.0, color: '#ffffff', glow: '#FFB800' },
  title:    { pos: [-4.5, -1.2, 3.5],   scale: 1.1, color: '#ffffff', glow: '#00c8ff' },
  company:  { pos: [0, 3.5, -1.0],      scale: 1.4, color: '#FFD700', glow: '#FFB800' },
  email:    { pos: [-3.5, 1.5, -5.0],   scale: 0.8, color: '#e0e0e0', glow: '#a855f7' },
  linkedin: { pos: [4.0, -1.8, 4.5],    scale: 0.7, color: '#e0e0e0', glow: '#0077b5' },
  telegram: { pos: [-5.5, 0.6, -2.0],   scale: 0.7, color: '#e0e0e0', glow: '#26a5e4' }
};

function launch(withCamera) {
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('topControls').classList.remove('hidden');
  document.getElementById('bottomControls').classList.remove('hidden');
  document.getElementById('navHint').classList.remove('hidden');
  if (withCamera) { arMode = true; startCamera(); document.getElementById('arToggle').classList.add('active-btn'); document.getElementById('arToggle').textContent = 'AR: ON'; }
  initGalaxy();
  initControls();
  animate();
}

function startCamera() {
  navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } } })
  .then(function(s) { var v = document.getElementById('cameraFeed'); v.srcObject = s; v.classList.add('active'); })
  .catch(function(e) { console.log('Camera:', e); });
}
function stopCamera() { var v = document.getElementById('cameraFeed'); if (v.srcObject) v.srcObject.getTracks().forEach(function(t) { t.stop(); }); v.classList.remove('active'); }
function toggleAR() { arMode = !arMode; var b = document.getElementById('arToggle'); if (arMode) { startCamera(); b.classList.add('active-btn'); b.textContent = 'AR: ON'; } else { stopCamera(); b.classList.remove('active-btn'); b.textContent = 'AR Mode'; } }
function switchPerson(k) { currentPerson = k; updateTexts(); document.querySelectorAll('.p-btn').forEach(function(b){b.classList.remove('active')}); document.getElementById('btn'+k.toUpperCase()).classList.add('active'); }
function resetView() { targetSpherical = { theta: 0.3, phi: Math.PI / 3.2, radius: 5.5 }; autoRotate = true; }

function initGalaxy() {
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 2000);

  renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  document.body.appendChild(renderer.domElement);

  // === SUN (multi-layer) ===
  sun = new THREE.Group();
  scene.add(sun);

  // Core
  var coreGeo = new THREE.SphereGeometry(0.12, 32, 32);
  sun.add(new THREE.Mesh(coreGeo, new THREE.MeshBasicMaterial({ color: 0xffffff })));

  // Inner sphere
  sun.add(new THREE.Mesh(new THREE.SphereGeometry(0.25, 32, 32), new THREE.MeshBasicMaterial({ color: 0xFFB800 })));

  // No glow — clean sun

  // === GALAXY SPIRAL (6000 particles) ===
  var count = 6000;
  var pos = new Float32Array(count * 3);
  var col = new Float32Array(count * 3);
  var sizes = new Float32Array(count);

  for (var i = 0; i < count; i++) {
    var arm = Math.floor(Math.random() * 4);
    var armAngle = (arm / 4) * Math.PI * 2;
    var dist = Math.pow(Math.random(), 0.6) * 7.5;
    var spiral = dist * 0.65 + armAngle;
    var scatter = (Math.random() - 0.5) * (0.15 + dist * 0.08);
    var scatterY = (Math.random() - 0.5) * 0.2 * Math.max(0, 1 - dist / 8);

    pos[i*3]   = Math.cos(spiral) * dist + scatter;
    pos[i*3+1] = scatterY;
    pos[i*3+2] = Math.sin(spiral) * dist + scatter;

    var t = dist / 7.5;
    var bright = Math.random();

    if (bright > 0.92) {
      // Bright blue-white stars
      col[i*3] = 0.8 + Math.random()*0.2; col[i*3+1] = 0.85 + Math.random()*0.15; col[i*3+2] = 1;
      sizes[i] = 3 + Math.random() * 4;
    } else if (t < 0.2) {
      // Hot core — yellow-white
      col[i*3] = 1; col[i*3+1] = 0.85 + Math.random()*0.15; col[i*3+2] = 0.5 + Math.random()*0.3;
      sizes[i] = 1.5 + Math.random() * 2;
    } else if (t < 0.45) {
      // Mid — blue-cyan
      col[i*3] = 0.3 + Math.random()*0.2; col[i*3+1] = 0.6 + Math.random()*0.3; col[i*3+2] = 0.9 + Math.random()*0.1;
      sizes[i] = 1 + Math.random() * 1.5;
    } else if (t < 0.7) {
      // Outer — purple-blue
      col[i*3] = 0.5 + Math.random()*0.2; col[i*3+1] = 0.2 + Math.random()*0.2; col[i*3+2] = 0.7 + Math.random()*0.3;
      sizes[i] = 0.8 + Math.random() * 1.2;
    } else {
      // Edge — dim red-purple
      col[i*3] = 0.4 + Math.random()*0.2; col[i*3+1] = 0.1 + Math.random()*0.15; col[i*3+2] = 0.3 + Math.random()*0.3;
      sizes[i] = 0.5 + Math.random() * 1;
    }
  }

  var gGeo = new THREE.BufferGeometry();
  gGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  gGeo.setAttribute('color', new THREE.BufferAttribute(col, 3));

  galaxyParticles = new THREE.Points(gGeo, new THREE.PointsMaterial({
    size: 0.035, map: makeStar(), transparent: true,
    vertexColors: true, blending: THREE.AdditiveBlending,
    depthWrite: false, sizeAttenuation: true
  }));
  scene.add(galaxyParticles);

  // === NEBULA CLOUDS (colored gas sprites) ===
  var nebulaData = [
    { x: 2.5, y: 0.1, z: 1.5, s: 3.5, c: 0x4f46e5, o: 0.06 },
    { x: -2.0, y: -0.1, z: -2.5, s: 4.0, c: 0x7c3aed, o: 0.05 },
    { x: 1.0, y: 0.15, z: -3.0, s: 3.0, c: 0x2563eb, o: 0.04 },
    { x: -3.5, y: 0.0, z: 1.0, s: 3.5, c: 0x9333ea, o: 0.05 },
    { x: 0.5, y: 0.05, z: 3.5, s: 2.5, c: 0x6366f1, o: 0.04 },
    { x: 3.0, y: -0.05, z: -1.0, s: 2.8, c: 0xec4899, o: 0.03 },
    { x: -1.5, y: 0.1, z: 2.0, s: 2.0, c: 0xFFB800, o: 0.03 },
  ];

  nebulaData.forEach(function(n) {
    var mat = new THREE.SpriteMaterial({ map: makeNebula(n.c), transparent: true, opacity: n.o, blending: THREE.AdditiveBlending, depthWrite: false });
    var s = new THREE.Sprite(mat);
    s.position.set(n.x, n.y, n.z);
    s.scale.set(n.s, n.s * 0.6, 1);
    scene.add(s);
    nebulaSprites.push(s);
  });

  // === ORBIT RINGS ===
  [[1.2, 0xFFB800, 0.12], [2.0, 0x00c8ff, 0.08], [3.2, 0xa855f7, 0.06]].forEach(function(r) {
    var rGeo = new THREE.RingGeometry(r[0]-0.006, r[0]+0.006, 200);
    var ring = new THREE.Mesh(rGeo, new THREE.MeshBasicMaterial({ color: r[1], transparent: true, opacity: r[2], side: THREE.DoubleSide }));
    ring.rotation.x = Math.PI * 0.5;
    scene.add(ring);
  });

  // === PLANETS ===
  [[1.2, 0.07, 0x00c8ff, 0.7, 0.35], [2.0, 0.055, 0xa855f7, 0.45, 0.25], [3.2, 0.08, 0x34d399, 0.25, 0.4]].forEach(function(d) {
    var p = new THREE.Mesh(new THREE.SphereGeometry(d[1], 16, 16), new THREE.MeshBasicMaterial({ color: d[2] }));
    p.userData = { radius: d[0], speed: d[3], offset: Math.random() * Math.PI * 2 };
    // Planet glow
    var gMat = new THREE.SpriteMaterial({ map: makeGlow(d[2]), transparent: true, opacity: d[4], blending: THREE.AdditiveBlending, depthWrite: false });
    var g = new THREE.Sprite(gMat); g.scale.set(0.4, 0.4, 1); p.add(g);
    scene.add(p); planets.push(p);
  });

  // === SHOOTING STARS ===
  for (var si = 0; si < 3; si++) {
    var sGeo = new THREE.BufferGeometry();
    var sPos = new Float32Array(6);
    sGeo.setAttribute('position', new THREE.BufferAttribute(sPos, 3));
    var sMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0, blending: THREE.AdditiveBlending });
    var sLine = new THREE.Line(sGeo, sMat);
    sLine.userData = { active: false, timer: Math.random() * 200, speed: 0.15 + Math.random() * 0.1, dir: new THREE.Vector3() };
    scene.add(sLine);
    shootingStars.push(sLine);
  }

  // === BACKGROUND STARS ===
  var bgPos = new Float32Array(800 * 3);
  var bgCol = new Float32Array(800 * 3);
  for (var b = 0; b < 800; b++) {
    bgPos[b*3] = (Math.random()-0.5)*60; bgPos[b*3+1] = (Math.random()-0.5)*60; bgPos[b*3+2] = (Math.random()-0.5)*60;
    var bri = 0.3 + Math.random() * 0.7;
    bgCol[b*3] = bri; bgCol[b*3+1] = bri; bgCol[b*3+2] = bri + Math.random() * 0.1;
  }
  var bgGeo = new THREE.BufferGeometry();
  bgGeo.setAttribute('position', new THREE.BufferAttribute(bgPos, 3));
  bgGeo.setAttribute('color', new THREE.BufferAttribute(bgCol, 3));
  scene.add(new THREE.Points(bgGeo, new THREE.PointsMaterial({ size: 0.025, vertexColors: true, transparent: true, blending: THREE.AdditiveBlending, depthWrite: false })));

  // === TEXT SPRITES ===
  createTexts();
  createLinks();

  window.addEventListener('resize', function() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
}

// ==================== TEXTURES ====================

function makeGlow(color) {
  var c = document.createElement('canvas'); c.width = 256; c.height = 256;
  var ctx = c.getContext('2d');
  var hex = typeof color === 'number' ? '#' + color.toString(16).padStart(6, '0') : color;
  var g = ctx.createRadialGradient(128,128,0,128,128,128);
  g.addColorStop(0, hex);
  g.addColorStop(0.2, hex + 'aa');
  g.addColorStop(0.5, hex + '33');
  g.addColorStop(1, hex + '00');
  ctx.fillStyle = g; ctx.fillRect(0,0,256,256);
  return new THREE.CanvasTexture(c);
}

function makeStar() {
  var c = document.createElement('canvas'); c.width = 64; c.height = 64;
  var ctx = c.getContext('2d');
  var g = ctx.createRadialGradient(32,32,0,32,32,32);
  g.addColorStop(0, 'rgba(255,255,255,1)');
  g.addColorStop(0.15, 'rgba(255,255,255,0.8)');
  g.addColorStop(0.4, 'rgba(255,255,255,0.3)');
  g.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = g; ctx.fillRect(0,0,64,64);
  return new THREE.CanvasTexture(c);
}

function makeNebula(color) {
  var c = document.createElement('canvas'); c.width = 256; c.height = 256;
  var ctx = c.getContext('2d');
  var hex = '#' + color.toString(16).padStart(6, '0');

  // Multiple overlapping radial gradients for cloud texture
  for (var i = 0; i < 5; i++) {
    var cx = 100 + Math.random() * 56;
    var cy = 100 + Math.random() * 56;
    var r = 60 + Math.random() * 60;
    var g = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
    g.addColorStop(0, hex + '40');
    g.addColorStop(0.5, hex + '15');
    g.addColorStop(1, hex + '00');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, 256, 256);
  }
  return new THREE.CanvasTexture(c);
}

// ==================== TEXT SPRITES ====================

function makeTextSprite(text, fontSize, color, glowHex) {
  var canvas = document.createElement('canvas');
  var ctx = canvas.getContext('2d');
  var dpr = 2;
  ctx.font = 'bold ' + (fontSize * dpr) + 'px Orbitron, sans-serif';
  var w = ctx.measureText(text).width + 40 * dpr;
  var h = (fontSize * dpr) + 30 * dpr;
  canvas.width = w; canvas.height = h;

  // Glow behind text
  ctx.shadowColor = glowHex || color;
  ctx.shadowBlur = 15 * dpr;
  ctx.fillStyle = color;
  ctx.font = 'bold ' + (fontSize * dpr) + 'px Orbitron, sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(text, w / 2, h / 2);

  // Crisp second pass
  ctx.shadowBlur = 0;
  ctx.fillText(text, w / 2, h / 2);

  var tex = new THREE.CanvasTexture(canvas);
  tex.minFilter = THREE.LinearFilter;
  var mat = new THREE.SpriteMaterial({ map: tex, transparent: true, blending: THREE.AdditiveBlending, depthWrite: false });
  var sprite = new THREE.Sprite(mat);
  var aspect = w / h;
  sprite.scale.set(aspect * 0.5, 0.5, 1);
  return sprite;
}

function createTexts() {
  textSprites.forEach(function(s) { scene.remove(s); });
  textSprites = [];
  var p = people[currentPerson];
  [
    { key: 'name', text: p.name }, { key: 'title', text: p.title },
    { key: 'company', text: 'SURYA AI TECH' }, { key: 'email', text: p.email },
    { key: 'linkedin', text: 'LinkedIn: ' + p.linkedin }, { key: 'telegram', text: 'Telegram: ' + p.telegram }
  ].forEach(function(item) {
    var L = textLayout[item.key];
    var sp = makeTextSprite(item.text, 14 * L.scale, L.color, L.glow);
    sp.position.set(L.pos[0], L.pos[1], L.pos[2]);
    sp.scale.multiplyScalar(L.scale);
    sp.userData.baseScale = sp.scale.clone();
    sp.userData.key = item.key;
    scene.add(sp); textSprites.push(sp);
  });
}

function updateTexts() { createTexts(); createLinks(); }

// Connection lines
var linkLines = [];
function createLinks() {
  linkLines.forEach(function(l) { scene.remove(l); }); linkLines = [];
  Object.keys(textLayout).forEach(function(key) {
    var L = textLayout[key];
    var curve = new THREE.CatmullRomCurve3([
      new THREE.Vector3(0, 0, 0),
      new THREE.Vector3(L.pos[0]*0.3, L.pos[1]*0.3, L.pos[2]*0.3),
      new THREE.Vector3(L.pos[0], L.pos[1], L.pos[2])
    ]);
    var geo = new THREE.BufferGeometry().setFromPoints(curve.getPoints(40));
    var mat = new THREE.LineBasicMaterial({ color: new THREE.Color(L.glow), transparent: true, opacity: 0.04, blending: THREE.AdditiveBlending });
    var line = new THREE.Line(geo, mat);
    scene.add(line); linkLines.push(line);
  });
}

// ==================== CONTROLS ====================

function initControls() {
  var el = renderer.domElement;
  el.addEventListener('mousedown', function(e) { isDragging = true; lastTouch = { x: e.clientX, y: e.clientY }; autoRotate = false; });
  window.addEventListener('mouseup', function() { isDragging = false; });
  window.addEventListener('mousemove', function(e) {
    if (!isDragging) return;
    targetSpherical.theta -= (e.clientX - lastTouch.x) * 0.005;
    targetSpherical.phi = Math.max(0.15, Math.min(Math.PI - 0.15, targetSpherical.phi - (e.clientY - lastTouch.y) * 0.005));
    lastTouch = { x: e.clientX, y: e.clientY };
  });
  el.addEventListener('wheel', function(e) { e.preventDefault(); targetSpherical.radius = Math.max(1.5, Math.min(15, targetSpherical.radius + e.deltaY * 0.004)); autoRotate = false; }, { passive: false });
  el.addEventListener('touchstart', function(e) { if (e.touches.length === 1) { isDragging = true; lastTouch = { x: e.touches[0].clientX, y: e.touches[0].clientY }; autoRotate = false; } else if (e.touches.length === 2) { lastPinchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY); } }, { passive: true });
  el.addEventListener('touchmove', function(e) { if (e.touches.length === 1 && isDragging) { targetSpherical.theta -= (e.touches[0].clientX - lastTouch.x) * 0.006; targetSpherical.phi = Math.max(0.15, Math.min(Math.PI - 0.15, targetSpherical.phi - (e.touches[0].clientY - lastTouch.y) * 0.006)); lastTouch = { x: e.touches[0].clientX, y: e.touches[0].clientY }; } else if (e.touches.length === 2) { var d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY); targetSpherical.radius = Math.max(1.5, Math.min(15, targetSpherical.radius + (lastPinchDist - d) * 0.015)); lastPinchDist = d; } }, { passive: true });
  el.addEventListener('touchend', function() { isDragging = false; });
}

function updateCamera() {
  camera.position.x = spherical.radius * Math.sin(spherical.phi) * Math.sin(spherical.theta);
  camera.position.y = spherical.radius * Math.cos(spherical.phi);
  camera.position.z = spherical.radius * Math.sin(spherical.phi) * Math.cos(spherical.theta);
  camera.lookAt(0, 0, 0);
}

// ==================== ANIMATE ====================

function animate() {
  requestAnimationFrame(animate);
  var t = Date.now() * 0.001;

  // Galaxy — static, no rotation

  // Auto-rotate camera — smooth sine wave for gentle orbit
  if (autoRotate) targetSpherical.theta = t * 0.05;

  // Smooth camera interpolation (lower = smoother)
  spherical.theta += (targetSpherical.theta - spherical.theta) * 0.025;
  spherical.phi += (targetSpherical.phi - spherical.phi) * 0.025;
  spherical.radius += (targetSpherical.radius - spherical.radius) * 0.025;
  updateCamera();

  // Sun pulse
  if (sun) { var s = 1 + Math.sin(t * 1.5) * 0.06; sun.scale.set(s, s, s); }

  // Planets
  planets.forEach(function(p) {
    var a = t * p.userData.speed + p.userData.offset;
    p.position.set(Math.cos(a) * p.userData.radius, Math.sin(a * 2) * 0.04, Math.sin(a) * p.userData.radius);
  });

  // Nebula drift
  nebulaSprites.forEach(function(n, i) {
    n.material.opacity = n.material.opacity + Math.sin(t * 0.3 + i) * 0.0002;
    n.position.y += Math.sin(t * 0.2 + i * 1.7) * 0.0003;
  });

  // Shooting stars
  shootingStars.forEach(function(ss) {
    ss.userData.timer--;
    if (!ss.userData.active && ss.userData.timer <= 0) {
      ss.userData.active = true;
      ss.userData.timer = 30;
      var angle = Math.random() * Math.PI * 2;
      var r = 3 + Math.random() * 4;
      var startPos = new THREE.Vector3(Math.cos(angle) * r, (Math.random() - 0.5) * 1.5, Math.sin(angle) * r);
      ss.userData.pos = startPos.clone();
      ss.userData.dir = new THREE.Vector3(-Math.cos(angle + 0.3), -0.2, -Math.sin(angle + 0.3)).normalize().multiplyScalar(ss.userData.speed);
      ss.material.opacity = 0.8;
    }
    if (ss.userData.active) {
      ss.userData.pos.add(ss.userData.dir);
      var p = ss.geometry.attributes.position.array;
      p[0] = ss.userData.pos.x; p[1] = ss.userData.pos.y; p[2] = ss.userData.pos.z;
      var tail = ss.userData.pos.clone().sub(ss.userData.dir.clone().multiplyScalar(5));
      p[3] = tail.x; p[4] = tail.y; p[5] = tail.z;
      ss.geometry.attributes.position.needsUpdate = true;
      ss.material.opacity *= 0.95;
      ss.userData.timer--;
      if (ss.userData.timer <= 0) { ss.userData.active = false; ss.material.opacity = 0; ss.userData.timer = 100 + Math.random() * 200; }
    }
  });

  // Text hover + distance scaling
  textSprites.forEach(function(sp, i) {
    var base = textLayout[sp.userData.key].pos;
    sp.position.y = base[1] + Math.sin(t * 0.4 + i * 1.3) * 0.1;
    var dist = camera.position.distanceTo(sp.position);
    var sc = Math.max(0.7, Math.min(2.2, 4.5 / dist));
    sp.scale.copy(sp.userData.baseScale).multiplyScalar(sc);
  });

  // Connection line pulse
  linkLines.forEach(function(l, i) { l.material.opacity = 0.03 + Math.sin(t * 0.8 + i * 0.9) * 0.02; });

  renderer.setClearColor(0x000000, arMode ? 0 : 1);
  renderer.render(scene, camera);
}

function shareGalaxy() { if (navigator.share) navigator.share({ title: 'Surya AI Tech - Galaxy', text: 'Explore our 3D Galaxy Business Card!', url: window.location.href }); }
