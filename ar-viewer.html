<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<title>Surya AI Tech - AR Galaxy</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&family=Exo+2:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@300;400;500&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Rajdhani',sans-serif;touch-action:none}
  canvas{position:fixed;inset:0;z-index:2}
  #cameraFeed{position:fixed;inset:0;object-fit:cover;width:100%;height:100%;z-index:1;opacity:0;transition:opacity 0.5s}
  #cameraFeed.active{opacity:1}

  /* Hint */
  .nav-hint{
    position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
    z-index:100;text-align:center;pointer-events:none;
    font-family:'JetBrains Mono',monospace;font-size:9px;
    letter-spacing:2px;color:rgba(255,255,255,0.2);text-transform:uppercase;
    animation:hintFade 5s ease 3s forwards;
  }
  @keyframes hintFade{to{opacity:0}}

  /* Controls */
  .top-controls{
    position:fixed;top:env(safe-area-inset-top,10px);left:50%;transform:translateX(-50%);
    z-index:100;display:flex;gap:0;
    background:rgba(0,0,0,0.4);border-radius:20px;
    backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,0.08);margin-top:10px;
  }
  .p-btn{
    font-family:'Orbitron',sans-serif;font-size:8px;letter-spacing:2px;
    padding:8px 18px;border:none;background:transparent;
    color:rgba(255,255,255,0.35);cursor:pointer;border-radius:20px;text-transform:uppercase;
  }
  .p-btn.active{background:rgba(255,184,0,0.2);color:#FFB800}

  .bottom-controls{
    position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
    z-index:100;display:flex;gap:12px;
  }
  .ctrl-btn{
    font-family:'Orbitron',sans-serif;font-size:8px;letter-spacing:2px;
    padding:10px 22px;
    border:1px solid rgba(255,184,0,0.25);
    background:rgba(0,0,0,0.4);
    backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
    color:rgba(255,255,255,0.5);border-radius:25px;cursor:pointer;text-transform:uppercase;
  }
  .ctrl-btn:active{background:rgba(255,184,0,0.15);color:#FFB800}
  .ctrl-btn.active-btn{background:rgba(255,184,0,0.12);color:#FFB800;border-color:rgba(255,184,0,0.4)}

  /* Start screen */
  .start-screen{
    position:fixed;inset:0;z-index:200;background:#020012;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
  }
  .start-screen .logo-sun{
    width:70px;height:70px;border-radius:50%;
    background:radial-gradient(circle,#fff,#FFD700 25%,#FFB800 50%,rgba(255,184,0,0) 100%);
    box-shadow:0 0 30px rgba(255,184,0,0.5),0 0 70px rgba(255,184,0,0.2),0 0 120px rgba(255,184,0,0.08);
    margin-bottom:8px;animation:sunPulse 3s ease-in-out infinite;
  }
  @keyframes sunPulse{0%,100%{box-shadow:0 0 30px rgba(255,184,0,0.5),0 0 70px rgba(255,184,0,0.2)}50%{box-shadow:0 0 40px rgba(255,184,0,0.6),0 0 90px rgba(255,184,0,0.3)}}
  .start-screen h2{font-family:'Orbitron',sans-serif;font-size:20px;font-weight:800;letter-spacing:6px;color:#FFB800}
  .start-screen .sub{font-family:'Rajdhani',sans-serif;font-size:13px;color:#444;letter-spacing:3px}
  .start-btn{
    font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:3px;
    padding:14px 36px;border:2px solid #FFB800;background:transparent;
    color:#FFB800;border-radius:30px;cursor:pointer;margin-top:16px;text-transform:uppercase;
  }
  .start-btn:active{background:rgba(255,184,0,0.1)}
  .ar-btn-start{margin-top:4px;border-color:rgba(0,200,255,0.4);color:rgba(0,200,255,0.7);font-size:9px;padding:10px 28px}
  .hidden{display:none!important}
</style>
</head>
<body>

<div class="start-screen" id="startScreen">
  <div class="logo-sun"></div>
  <h2>SURYA AI TECH</h2>
  <p class="sub">3D Galaxy Business Card</p>
  <button class="start-btn" onclick="launch(false)">Enter Galaxy</button>
  <button class="start-btn ar-btn-start" onclick="launch(true)">AR Mode (Camera)</button>
</div>

<video id="cameraFeed" autoplay playsinline muted></video>

<div class="nav-hint hidden" id="navHint">Drag to orbit &bull; Pinch to zoom &bull; Explore to find name</div>

<div class="top-controls hidden" id="topControls">
  <button class="p-btn active" id="btnK" onclick="switchPerson('k')">Kishore</button>
  <button class="p-btn" id="btnS" onclick="switchPerson('s')">Soumya</button>
</div>

<div class="bottom-controls hidden" id="bottomControls">
  <button class="ctrl-btn" id="arToggle" onclick="toggleAR()">AR Mode</button>
  <button class="ctrl-btn" onclick="resetView()">Reset View</button>
  <button class="ctrl-btn" onclick="shareGalaxy()">Share</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
var scene, camera, renderer, sun, galaxyParticles;
var orbitRings = [], planets = [], textSprites = [];
var arMode = false;

// Orbit controls state
var spherical = { theta: 0, phi: Math.PI / 3, radius: 6 };
var targetSpherical = { theta: 0, phi: Math.PI / 3, radius: 6 };
var isDragging = false;
var lastTouch = { x: 0, y: 0 };
var lastPinchDist = 0;
var autoRotate = true;

var people = {
  k: {
    name: 'KISHORE RAJENDRA',
    title: 'CO-FOUNDER & CTO',
    email: 'kishore@devpilot.co.in',
    linkedin: 'kishorer747',
    telegram: '@chi_shift'
  },
  s: {
    name: 'SOUMYA SWAIN',
    title: 'CO-FOUNDER & FOUNDING MEMBER',
    email: 'sowmya@devpilot.co.in',
    linkedin: 'soumya-swain',
    telegram: '@soumyaswian'
  }
};

var currentPerson = 'k';

// Text positions in 3D space — scattered across the galaxy
var textLayout = {
  name:     { pos: [3.5, 1.2, -1.5],  scale: 1.8, color: '#ffffff' },
  title:    { pos: [-3.0, -0.6, 2.5],  scale: 1.0, color: '#00c8ff' },
  company:  { pos: [0, 2.2, 0],        scale: 1.2, color: '#FFB800' },
  email:    { pos: [-2.0, 0.8, -3.5],  scale: 0.7, color: '#a855f7' },
  linkedin: { pos: [2.5, -1.0, 3.0],   scale: 0.6, color: '#0077b5' },
  telegram: { pos: [-4.0, 0.3, -1.0],  scale: 0.6, color: '#26a5e4' }
};

function launch(withCamera) {
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('topControls').classList.remove('hidden');
  document.getElementById('bottomControls').classList.remove('hidden');
  document.getElementById('navHint').classList.remove('hidden');

  if (withCamera) {
    arMode = true;
    startCamera();
    document.getElementById('arToggle').classList.add('active-btn');
    document.getElementById('arToggle').textContent = 'AR: ON';
  }

  initGalaxy();
  initControls();
  animate();
}

function startCamera() {
  navigator.mediaDevices.getUserMedia({
    video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } }
  }).then(function(stream) {
    var v = document.getElementById('cameraFeed');
    v.srcObject = stream;
    v.classList.add('active');
  }).catch(function(e) { console.log('Camera:', e); });
}

function stopCamera() {
  var v = document.getElementById('cameraFeed');
  if (v.srcObject) v.srcObject.getTracks().forEach(function(t) { t.stop(); });
  v.classList.remove('active');
}

function toggleAR() {
  arMode = !arMode;
  var btn = document.getElementById('arToggle');
  if (arMode) { startCamera(); btn.classList.add('active-btn'); btn.textContent = 'AR: ON'; }
  else { stopCamera(); btn.classList.remove('active-btn'); btn.textContent = 'AR Mode'; }
}

function switchPerson(key) {
  currentPerson = key;
  updateTextSprites();
  document.querySelectorAll('.p-btn').forEach(function(b) { b.classList.remove('active'); });
  document.getElementById('btn' + key.toUpperCase()).classList.add('active');
}

function resetView() {
  targetSpherical.theta = 0;
  targetSpherical.phi = Math.PI / 3;
  targetSpherical.radius = 6;
  autoRotate = true;
}

// ==================== THREE.JS GALAXY ====================

function initGalaxy() {
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 2000);
  updateCameraFromSpherical();

  renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  document.body.appendChild(renderer.domElement);

  // SUN
  var sunGeo = new THREE.SphereGeometry(0.3, 32, 32);
  var sunMat = new THREE.MeshBasicMaterial({ color: 0xFFB800 });
  sun = new THREE.Mesh(sunGeo, sunMat);
  scene.add(sun);

  var coreGeo = new THREE.SphereGeometry(0.15, 16, 16);
  var coreMat = new THREE.MeshBasicMaterial({ color: 0xFFFFFF });
  sun.add(new THREE.Mesh(coreGeo, coreMat));

  var glowMat = new THREE.SpriteMaterial({ map: makeGlow(), transparent: true, opacity: 0.6, blending: THREE.AdditiveBlending });
  var glow = new THREE.Sprite(glowMat);
  glow.scale.set(2.5, 2.5, 1);
  sun.add(glow);

  // GALAXY PARTICLES (spiral)
  var count = 3500;
  var pos = new Float32Array(count * 3);
  var col = new Float32Array(count * 3);

  for (var i = 0; i < count; i++) {
    var arm = Math.floor(Math.random() * 3);
    var armAngle = (arm / 3) * Math.PI * 2;
    var dist = Math.pow(Math.random(), 0.5) * 7;
    var spiral = dist * 0.7 + armAngle;
    var scatter = (Math.random() - 0.5) * 0.8 * (dist * 0.12 + 0.15);
    var scatterY = (Math.random() - 0.5) * 0.25 * (1 - dist / 9);

    pos[i*3]   = Math.cos(spiral) * dist + scatter;
    pos[i*3+1] = scatterY;
    pos[i*3+2] = Math.sin(spiral) * dist + scatter;

    var t = dist / 7;
    if (Math.random() < 0.15) {
      col[i*3] = 1; col[i*3+1] = 0.95; col[i*3+2] = 0.8;
    } else if (t < 0.25) {
      col[i*3] = 1; col[i*3+1] = 0.7; col[i*3+2] = 0.25;
    } else if (t < 0.55) {
      col[i*3] = 0.4; col[i*3+1] = 0.7; col[i*3+2] = 1;
    } else {
      col[i*3] = 0.55; col[i*3+1] = 0.3; col[i*3+2] = 0.85;
    }
  }

  var gGeo = new THREE.BufferGeometry();
  gGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  gGeo.setAttribute('color', new THREE.BufferAttribute(col, 3));

  var gMat = new THREE.PointsMaterial({
    size: 0.04, map: makeStar(), transparent: true,
    vertexColors: true, blending: THREE.AdditiveBlending,
    depthWrite: false, sizeAttenuation: true
  });

  galaxyParticles = new THREE.Points(gGeo, gMat);
  scene.add(galaxyParticles);

  // ORBIT RINGS
  [[1.0, 0xFFB800], [1.8, 0x00c8ff], [2.8, 0xa855f7]].forEach(function(r) {
    var rGeo = new THREE.RingGeometry(r[0]-0.005, r[0]+0.005, 128);
    var rMat = new THREE.MeshBasicMaterial({ color: r[1], transparent: true, opacity: 0.12, side: THREE.DoubleSide });
    var ring = new THREE.Mesh(rGeo, rMat);
    ring.rotation.x = Math.PI * 0.5;
    scene.add(ring);
    orbitRings.push(ring);
  });

  // PLANETS
  [[1.0, 0.06, 0x00c8ff, 0.8], [1.8, 0.05, 0xa855f7, 0.5], [2.8, 0.07, 0x34d399, 0.3]].forEach(function(d) {
    var p = new THREE.Mesh(new THREE.SphereGeometry(d[1], 16, 16), new THREE.MeshBasicMaterial({ color: d[2] }));
    p.userData = { radius: d[0], speed: d[3], offset: Math.random() * Math.PI * 2 };
    var pgMat = new THREE.SpriteMaterial({ map: makeGlow(), color: d[2], transparent: true, opacity: 0.4, blending: THREE.AdditiveBlending });
    var pg = new THREE.Sprite(pgMat); pg.scale.set(0.3, 0.3, 1); p.add(pg);
    scene.add(p);
    planets.push(p);
  });

  // BACKGROUND STARS
  var bgPos = new Float32Array(600 * 3);
  for (var b = 0; b < 600; b++) {
    bgPos[b*3] = (Math.random()-0.5)*50;
    bgPos[b*3+1] = (Math.random()-0.5)*50;
    bgPos[b*3+2] = (Math.random()-0.5)*50;
  }
  var bgGeo = new THREE.BufferGeometry();
  bgGeo.setAttribute('position', new THREE.BufferAttribute(bgPos, 3));
  scene.add(new THREE.Points(bgGeo, new THREE.PointsMaterial({ size: 0.03, color: 0xffffff, transparent: true, opacity: 0.4, blending: THREE.AdditiveBlending })));

  // TEXT SPRITES — scattered in galaxy
  createAllTextSprites();

  // CONNECTION LINES from text to sun (subtle)
  createConnectionLines();

  window.addEventListener('resize', function() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
}

// ==================== TEXT SPRITES ====================

function makeTextSprite(text, fontSize, color, glowColor) {
  var canvas = document.createElement('canvas');
  var ctx = canvas.getContext('2d');
  var dpr = 2;

  ctx.font = 'bold ' + (fontSize * dpr) + 'px Orbitron, sans-serif';
  var metrics = ctx.measureText(text);
  var w = metrics.width + 40 * dpr;
  var h = (fontSize * dpr) + 30 * dpr;

  canvas.width = w;
  canvas.height = h;

  // Glow behind text
  ctx.shadowColor = glowColor || color;
  ctx.shadowBlur = 15 * dpr;
  ctx.fillStyle = color;
  ctx.font = 'bold ' + (fontSize * dpr) + 'px Orbitron, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, w / 2, h / 2);

  // Second pass for crispness
  ctx.shadowBlur = 0;
  ctx.fillText(text, w / 2, h / 2);

  var texture = new THREE.CanvasTexture(canvas);
  texture.minFilter = THREE.LinearFilter;

  var mat = new THREE.SpriteMaterial({
    map: texture,
    transparent: true,
    blending: THREE.AdditiveBlending,
    depthWrite: false
  });

  var sprite = new THREE.Sprite(mat);
  var aspect = w / h;
  sprite.scale.set(aspect * 0.5, 0.5, 1);
  return sprite;
}

function createAllTextSprites() {
  // Remove old sprites
  textSprites.forEach(function(s) { scene.remove(s); });
  textSprites = [];

  var p = people[currentPerson];
  var items = [
    { key: 'name',     text: p.name },
    { key: 'title',    text: p.title },
    { key: 'company',  text: 'SURYA AI TECH' },
    { key: 'email',    text: p.email },
    { key: 'linkedin', text: 'LinkedIn: ' + p.linkedin },
    { key: 'telegram', text: 'Telegram: ' + p.telegram }
  ];

  items.forEach(function(item) {
    var layout = textLayout[item.key];
    var sprite = makeTextSprite(item.text, 14 * layout.scale, layout.color, layout.color);
    sprite.position.set(layout.pos[0], layout.pos[1], layout.pos[2]);
    sprite.scale.multiplyScalar(layout.scale);
    sprite.userData.baseScale = sprite.scale.clone();
    sprite.userData.key = item.key;
    scene.add(sprite);
    textSprites.push(sprite);
  });
}

function updateTextSprites() {
  // Remove and recreate with new person data
  createAllTextSprites();
  createConnectionLines();
}

// ==================== CONNECTION LINES ====================

var connectionLines = [];

function createConnectionLines() {
  connectionLines.forEach(function(l) { scene.remove(l); });
  connectionLines = [];

  Object.keys(textLayout).forEach(function(key) {
    var layout = textLayout[key];
    var points = [
      new THREE.Vector3(0, 0, 0),
      new THREE.Vector3(layout.pos[0] * 0.3, layout.pos[1] * 0.3, layout.pos[2] * 0.3),
      new THREE.Vector3(layout.pos[0], layout.pos[1], layout.pos[2])
    ];

    var curve = new THREE.CatmullRomCurve3(points);
    var lineGeo = new THREE.BufferGeometry().setFromPoints(curve.getPoints(30));
    var lineMat = new THREE.LineBasicMaterial({
      color: new THREE.Color(layout.color),
      transparent: true,
      opacity: 0.06,
      blending: THREE.AdditiveBlending
    });
    var line = new THREE.Line(lineGeo, lineMat);
    scene.add(line);
    connectionLines.push(line);
  });
}

// ==================== ORBIT CONTROLS ====================

function initControls() {
  var el = renderer.domElement;

  // Mouse
  el.addEventListener('mousedown', function(e) { isDragging = true; lastTouch.x = e.clientX; lastTouch.y = e.clientY; autoRotate = false; });
  window.addEventListener('mouseup', function() { isDragging = false; });
  window.addEventListener('mousemove', function(e) {
    if (!isDragging) return;
    var dx = e.clientX - lastTouch.x;
    var dy = e.clientY - lastTouch.y;
    targetSpherical.theta -= dx * 0.005;
    targetSpherical.phi = Math.max(0.2, Math.min(Math.PI - 0.2, targetSpherical.phi - dy * 0.005));
    lastTouch.x = e.clientX;
    lastTouch.y = e.clientY;
  });
  el.addEventListener('wheel', function(e) {
    e.preventDefault();
    targetSpherical.radius = Math.max(2, Math.min(15, targetSpherical.radius + e.deltaY * 0.005));
    autoRotate = false;
  }, { passive: false });

  // Touch
  el.addEventListener('touchstart', function(e) {
    if (e.touches.length === 1) {
      isDragging = true;
      lastTouch.x = e.touches[0].clientX;
      lastTouch.y = e.touches[0].clientY;
      autoRotate = false;
    } else if (e.touches.length === 2) {
      lastPinchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    }
  }, { passive: true });

  el.addEventListener('touchmove', function(e) {
    if (e.touches.length === 1 && isDragging) {
      var dx = e.touches[0].clientX - lastTouch.x;
      var dy = e.touches[0].clientY - lastTouch.y;
      targetSpherical.theta -= dx * 0.006;
      targetSpherical.phi = Math.max(0.2, Math.min(Math.PI - 0.2, targetSpherical.phi - dy * 0.006));
      lastTouch.x = e.touches[0].clientX;
      lastTouch.y = e.touches[0].clientY;
    } else if (e.touches.length === 2) {
      var d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
      var delta = lastPinchDist - d;
      targetSpherical.radius = Math.max(2, Math.min(15, targetSpherical.radius + delta * 0.02));
      lastPinchDist = d;
    }
  }, { passive: true });

  el.addEventListener('touchend', function() { isDragging = false; });
}

function updateCameraFromSpherical() {
  camera.position.x = spherical.radius * Math.sin(spherical.phi) * Math.sin(spherical.theta);
  camera.position.y = spherical.radius * Math.cos(spherical.phi);
  camera.position.z = spherical.radius * Math.sin(spherical.phi) * Math.cos(spherical.theta);
  camera.lookAt(0, 0, 0);
}

// ==================== TEXTURES ====================

function makeGlow() {
  var c = document.createElement('canvas'); c.width = 128; c.height = 128;
  var ctx = c.getContext('2d');
  var g = ctx.createRadialGradient(64,64,0,64,64,64);
  g.addColorStop(0, 'rgba(255,200,50,0.8)');
  g.addColorStop(0.3, 'rgba(255,180,0,0.3)');
  g.addColorStop(0.7, 'rgba(255,140,0,0.05)');
  g.addColorStop(1, 'rgba(255,100,0,0)');
  ctx.fillStyle = g; ctx.fillRect(0,0,128,128);
  return new THREE.CanvasTexture(c);
}

function makeStar() {
  var c = document.createElement('canvas'); c.width = 32; c.height = 32;
  var ctx = c.getContext('2d');
  var g = ctx.createRadialGradient(16,16,0,16,16,16);
  g.addColorStop(0, 'rgba(255,255,255,1)');
  g.addColorStop(0.3, 'rgba(255,255,255,0.5)');
  g.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = g; ctx.fillRect(0,0,32,32);
  return new THREE.CanvasTexture(c);
}

// ==================== ANIMATION LOOP ====================

function animate() {
  requestAnimationFrame(animate);
  var t = Date.now() * 0.001;

  // Auto-rotate galaxy
  if (galaxyParticles) galaxyParticles.rotation.y += 0.0008;

  // Auto-rotate camera slowly
  if (autoRotate) targetSpherical.theta += 0.0015;

  // Smooth camera interpolation
  spherical.theta += (targetSpherical.theta - spherical.theta) * 0.05;
  spherical.phi += (targetSpherical.phi - spherical.phi) * 0.05;
  spherical.radius += (targetSpherical.radius - spherical.radius) * 0.05;
  updateCameraFromSpherical();

  // Sun pulse
  if (sun) {
    var s = 1 + Math.sin(t * 2) * 0.05;
    sun.scale.set(s, s, s);
  }

  // Planets orbit
  planets.forEach(function(p) {
    var a = t * p.userData.speed + p.userData.offset;
    p.position.x = Math.cos(a) * p.userData.radius;
    p.position.z = Math.sin(a) * p.userData.radius;
    p.position.y = Math.sin(a * 2) * 0.04;
  });

  // Text sprites — gentle hover animation
  textSprites.forEach(function(sp, i) {
    var base = textLayout[sp.userData.key].pos;
    sp.position.y = base[1] + Math.sin(t * 0.5 + i * 1.2) * 0.08;

    // Scale based on camera distance — grow when close
    var dist = camera.position.distanceTo(sp.position);
    var scaleBoost = Math.max(0.8, Math.min(2.0, 4.0 / dist));
    sp.scale.copy(sp.userData.baseScale).multiplyScalar(scaleBoost);
  });

  // Connection lines — subtle pulse
  connectionLines.forEach(function(l, i) {
    l.material.opacity = 0.04 + Math.sin(t + i) * 0.02;
  });

  renderer.setClearColor(0x000000, arMode ? 0 : 1);
  renderer.render(scene, camera);
}

function shareGalaxy() {
